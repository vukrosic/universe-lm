id: arq-030-unetskip
title: FIRE + U-Net sigmoid skips
idea: 030-unet-skip-sigmoid
plain: "Adds shortcut wires connecting the early layers straight to the later layers in a U-shape, each with a soft on/off dial, so useful information can skip ahead. Already finished — its numbers are in the results below."
repo: https://github.com/vukrosic/universe-lm
commit: af78fb8326ef54c36d2d25e799d5e3c16006d7a3
command: python _arq_030.py
config:
  seed: 42
  dataset_path: processed_data/pretrain_1B
  warmup: false
requires:
  gpu_vram_gb: 24
  hours: 2
report:
  metrics:
    - val_loss
    - train_loss
    - tokens_per_sec
  curve: loss_curve.csv
