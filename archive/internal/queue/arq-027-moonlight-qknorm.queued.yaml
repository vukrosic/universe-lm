id: arq-027-moonlight-qknorm
title: Moonlight Muon x QK-Norm
idea: 027-moonlight-x-qknorm
plain: "Changes how the model is trained: a newer method (Muon) that nudges its settings in a smarter direction each step, plus a small stabilizer that keeps part of the attention math from growing too large and breaking training."
repo: https://github.com/vukrosic/universe-lm
commit: af78fb8326ef54c36d2d25e799d5e3c16006d7a3
command: python _arq_027.py
config:
  seed: 42
  dataset_path: processed_data/pretrain_1B
  warmup: false
requires:
  gpu_vram_gb: 24
  hours: 2
report:
  metrics:
    - val_loss
    - train_loss
    - tokens_per_sec
  curve: loss_curve.csv
