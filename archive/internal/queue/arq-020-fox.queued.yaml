id: arq-020-fox
title: FIRE + FoX on Tiny1M3M
idea: 020-forgetting-attn
plain: "Adds two changes at once: a smarter way to keep track of word order, and a way to let the model gently ignore words from far back so it focuses more on what is nearby."
repo: https://github.com/vukrosic/universe-lm
commit: af78fb8326ef54c36d2d25e799d5e3c16006d7a3
command: python _arq_020.py
config:
  seed: 42
  dataset_path: processed_data/pretrain_1B
  warmup: false
requires:
  gpu_vram_gb: 24
  hours: 2
report:
  metrics:
    - val_loss
    - train_loss
    - tokens_per_sec
  curve: loss_curve.csv
